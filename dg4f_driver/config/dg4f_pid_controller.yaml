/**/controller_manager:
  ros__parameters:
    update_rate: 300

    # 조인트별 PI 위치-제어기(출력: effort)
    j_dg_1_1_pospid: { type: pid_controller/PidController }
    j_dg_1_2_pospid: { type: pid_controller/PidController }
    j_dg_1_3_pospid: { type: pid_controller/PidController }
    j_dg_1_4_pospid: { type: pid_controller/PidController }
    j_dg_2_1_pospid: { type: pid_controller/PidController }
    j_dg_2_2_pospid: { type: pid_controller/PidController }
    j_dg_2_3_pospid: { type: pid_controller/PidController }
    j_dg_2_4_pospid: { type: pid_controller/PidController }
    j_dg_3_1_pospid: { type: pid_controller/PidController }
    j_dg_3_2_pospid: { type: pid_controller/PidController }
    j_dg_3_3_pospid: { type: pid_controller/PidController }
    j_dg_3_4_pospid: { type: pid_controller/PidController }
    j_dg_4_1_pospid: { type: pid_controller/PidController }
    j_dg_4_2_pospid: { type: pid_controller/PidController }
    j_dg_4_3_pospid: { type: pid_controller/PidController }
    j_dg_4_4_pospid: { type: pid_controller/PidController }
    j_dg_1_inner_pospid: { type: pid_controller/PidController }
    j_dg_4_inner_pospid: { type: pid_controller/PidController }

    # 상태 브로드캐스터(옵션이지만 보통 함께 사용)
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# ------------- 각 조인트별 PI 게인 -------------
/**/j_dg_1_1_pospid:
  ros__parameters:
    dof_names: ["j_dg_1_1"]
    command_interface: effort
    reference_and_state_interfaces: ["position"]
    gains:
      j_dg_1_1: { p: 1.5, i: 0.0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0 }

/**/j_dg_1_2_pospid:
